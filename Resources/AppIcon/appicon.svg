<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lungGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>
  
  <!-- Main lungs icon -->
  <g transform="translate(256, 240)">
    <!-- Left lung -->
    <path d="M-60,-50 C-90,-50 -110,-20 -110,20 C-110,60 -90,90 -60,90 C-40,90 -25,75 -25,55 L-25,20 C-25,-20 -40,-50 -60,-50 Z" 
          fill="url(#lungGradient)" stroke="#FFFFFF" stroke-width="3"/>
    
    <!-- Right lung -->
    <path d="M60,-50 C90,-50 110,-20 110,20 C110,60 90,90 60,90 C40,90 25,75 25,55 L25,20 C25,-20 40,-50 60,-50 Z" 
          fill="url(#lungGradient)" stroke="#FFFFFF" stroke-width="3"/>
    
    <!-- Trachea -->
    <rect x="-8" y="-80" width="16" height="50" fill="#FFFFFF" rx="8"/>
    
    <!-- Bronchi -->
    <path d="M0,-30 L-20,10" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,-30 L20,10" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Health indicator - small heart -->
    <path d="M0,-100 C-8,-110 -16,-110 -16,-100 C-16,-95 -12,-90 0,-80 C12,-90 16,-95 16,-100 C16,-110 8,-110 0,-100 Z" 
          fill="#FF6B6B"/>
  </g>
  
  <!-- Progress indicator at bottom -->
  <g transform="translate(256, 420)">
    <circle cx="-30" cy="0" r="8" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="30" cy="0" r="8" fill="#FFFFFF" opacity="0.5"/>
  </g>
</svg>